services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  controller:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      - CONTROLLER_ADDR=:8080
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/app/configs/swarm-dev.yaml
    volumes:
      - ./configs:/app/configs
    depends_on:
      - redis

  fitness-calc:
    build:
      context: ./examples/fitness-python
    ports:
      - "9000:9000"

  client-0:
    build:
      context: .
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-0
    depends_on:
      - controller

  client-1:
    build:
      context: .
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-1
    depends_on:
      - controller

  client-2:
    build:
      context: .
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-2
    depends_on:
      - controller

  client-3:
    build:
      context: .
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-3
    depends_on:
      - controller

  client-4:
    build:
      context: .
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-4
    depends_on:
      - controller

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      - controller

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
