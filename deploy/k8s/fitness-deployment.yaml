apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-calc
  namespace: pso-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fitness-calc
  template:
    metadata:
      labels:
        app: fitness-calc
    spec:
      containers:
        - name: fitness-calc
          image: pso-fitness-calc:latest
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-calc
  namespace: pso-system
spec:
  selector:
    app: fitness-calc
  ports:
    - port: 9000
      targetPort: 9000
