apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: pso-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: controller
          image: pso-controller:latest
          ports:
            - containerPort: 8080
          env:
            - name: CONTROLLER_ADDR
              value: ":8080"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: CONFIG_PATH
              value: "/app/configs/swarm.yaml"
          volumeMounts:
            - name: config
              mountPath: /app/configs
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: swarm-config
