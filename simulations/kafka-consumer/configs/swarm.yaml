swarm:
  cluster_id: kafka-consumer-swarm
  size: 5
  max_iter: -1
  observation_window: 10s
  fitness_calculator_url: http://fitness-calc:9000
  report_timeout: 15s
  max_skip_iterations: 5
  eviction_after_iterations: -1
  max_report_failures: 5
  new_particle_seed: random

pso:
  inertia: 0.729
  cognitive: 1.49445
  social: 1.49445

space:
  - name: num_consumers
    type: int
    min: 1
    max: 20
    default: 4

  - name: max_poll_records
    type: int
    min: 100
    max: 5000
    default: 500

  - name: fetch_min_bytes
    type: int
    min: 1
    max: 1048576
    default: 1024

  - name: session_timeout_ms
    type: int
    min: 6000
    max: 60000
    default: 15000
