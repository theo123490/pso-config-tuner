services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  controller:
    build:
      context: ../..
    ports:
      - "8080:8080"
    environment:
      - CONTROLLER_ADDR=:8080
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/app/configs/swarm.yaml
    volumes:
      - ./configs:/app/configs
    depends_on:
      - redis

  fitness-calc:
    build:
      context: ./fitness
    ports:
      - "9000:9000"

  client-0:
    build:
      context: ../..
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-0
    depends_on:
      - controller

  client-1:
    build:
      context: ../..
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-1
    depends_on:
      - controller

  client-2:
    build:
      context: ../..
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-2
    depends_on:
      - controller

  client-3:
    build:
      context: ../..
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-3
    depends_on:
      - controller

  client-4:
    build:
      context: ../..
      dockerfile: examples/client-go/Dockerfile
    environment:
      - CONTROLLER_URL=http://controller:8080
      - PARTICLE_ID=client-4
    depends_on:
      - controller
